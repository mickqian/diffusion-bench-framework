stage_args:
  - stage_id: 0
    stage_type: diffusion
    runtime:
      devices: "0"
    engine_args:
      model_stage: diffusion
      max_num_seqs: 1
      model_class_name: Cosmos3OmniDiffusersPipeline
      model_config:
        guardrails: false
      parallel_config:
        tensor_parallel_size: 1
        cfg_parallel_size: 1
        ulysses_degree: 1
        ring_degree: 1
      enforce_eager: true
      distributed_executor_backend: mp
      cache_backend: none
      diffusion_attention_config:
        default:
          backend: FLASH_ATTN
    final_output: true
    final_output_type: image
