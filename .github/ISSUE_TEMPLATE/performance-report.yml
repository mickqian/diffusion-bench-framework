name: Performance Tracker Bootstrap
description: Create the fixed tracker issue for generated benchmark report comments in a new fork.
title: "[perf] Diffusion benchmark tracker"
labels: ["performance", "benchmark", "sgld"]
body:
  - type: textarea
    id: tracker-purpose
    attributes:
      label: Tracker Purpose
      description: State that generated report comments should be appended here.
      placeholder: "Generated benchmark reports append data-only comments to this issue."
    validations:
      required: true
